version: '3.8'

services:
  app:
    build: .
    container_name: threat-advisory
    ports:
      - "3000:3000"
    environment:
      # You can set environment variables here or use an env_file
      # - MONGODB_URI=your_mongodb_connection_string
      # - JWT_SECRET=your_jwt_secret_key
    env_file:
      - .env.local
    restart: unless-stopped
    volumes:
      # Mount Telegram session file so it persists outside the image
      # Create this file on the host first by running telegram_fetcher.py once interactively
      - ./backend/telegram_scraper_session.session:/app/backend/telegram_scraper_session.session
