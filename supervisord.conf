[supervisord]
nodaemon=true

[program:web]
command=npm start
directory=/app
environment=NODE_ENV="production"
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true
startretries=3

[program:worker]
; Worker runs generate_advisories periodically if ENABLE_WORKER=1
command=bash -lc 'if [ "${ENABLE_WORKER:-0}" = "1" ]; then while true; do python /app/backend/generate_advisories.py 3 || true; sleep 3600; done; else tail -f /dev/null; fi'
directory=/app
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true

[program:article-fetcher]
; Runs all_feeds.py every day at 09:00 AM IST (03:30 UTC) if ENABLE_ARTICLE_FETCHER=1
; Uses supercronic-style wait: sleeps until the next 03:30 UTC, then runs, then loops.
command=bash -lc '
  if [ "${ENABLE_ARTICLE_FETCHER:-1}" = "0" ]; then
    echo "[article-fetcher] Disabled (ENABLE_ARTICLE_FETCHER=0). Idling."
    tail -f /dev/null
    exit 0
  fi
  echo "[article-fetcher] Started. Waiting for 09:00 IST (03:30 UTC) daily."
  while true; do
    now=$(date -u +%H:%M)
    target="03:30"
    now_sec=$(date -u +%s)
    target_sec=$(date -u -d "today $target UTC" +%s 2>/dev/null || date -u -j -f "%H:%M" "$target" +%s 2>/dev/null || echo 0)
    if [ "$target_sec" -le "$now_sec" ]; then
      target_sec=$(( target_sec + 86400 ))
    fi
    sleep_sec=$(( target_sec - now_sec ))
    echo "[article-fetcher] Next run in ${sleep_sec}s (at 03:30 UTC / 09:00 IST)"
    sleep $sleep_sec
    echo "[article-fetcher] === Starting all_feeds.py at $(date -u) ==="
    python /app/backend/all_feeds.py || echo "[article-fetcher] all_feeds.py exited non-zero"
    echo "[article-fetcher] === Completed at $(date -u) ==="
    sleep 60
  done
'
directory=/app
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
autorestart=true
startretries=3